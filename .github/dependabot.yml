version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    rebase-strategy: auto
    ignore:
      # Pinned for Bonsai ES 7 — any newer version breaks
      - dependency-name: "@elastic/elasticsearch"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    rebase-strategy: auto
